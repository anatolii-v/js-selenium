name: E2E tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      CI: true
      DEMOQA_BASE_URL: https://demoqa.com/
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Chrome and Chromedriver
        uses: nanasess/setup-chromedriver@v2

      - name: Verify Chrome and Chromedriver
        run: |
          google-chrome --version
          chromedriver --version

      - name: Install dependencies
        run: npm ci

      - name: Ensure test user exists
        run: node tests/setup/EnsureTestUser.js

      - name: Run tests
        run: npx mocha tests/**/*.js --timeout 60000 --exit

      - name: Ensure screenshots directory exists
        if: always()
        run: mkdir -p screenshots

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots